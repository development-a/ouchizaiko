<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
おうち在庫管理
</title>


<link rel="stylesheet"
href="css/style.css">

</head>


<body>


<header>

<h1>
🏠 おうち在庫管理
</h1>


<a href="category.html">
ジャンル管理
</a>


<div class="summary">

<span id="total-items">
登録 0件
</span>


<span id="shopping-count">
買い物 0件
</span>


</div>


</header>




<main>


<section class="input-card">


<h2>
商品登録
</h2>



<div class="form">


<input
id="item-name"
placeholder="商品名">


<select id="item-category">
</select>


<button id="add-button">
登録
</button>


</div>


</section>





<section class="filter-card">


<h2>
フィルター
</h2>


<select id="filter-category">


<option value="all">

すべて

</option>


</select>


</section>






<section class="list-card">


<h2>
在庫一覧
</h2>


<div id="inventory-list">

</div>


</section>





<section class="shopping-card">


<h2>
🛒 買い物リスト
</h2>


<div id="shopping-list">

</div>


</section>



</main>



<footer>

GitHub Pages

</footer>



<script src="js/storage.js"></script>

<script src="js/app.js"></script>


</body>

</html>
