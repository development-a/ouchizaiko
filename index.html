<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
おうち在庫管理ツール
</title>


<link rel="stylesheet" href="css/style.css">

</head>


<body>


<header>

<h1>
🏠 おうち在庫管理ツール
</h1>


<div class="summary">

<span id="total-items">
在庫 0件
</span>


<span id="shopping-count">
買い物 0件
</span>

</div>


</header>



<main>



<section class="input-card">


<h2>
在庫登録
</h2>



<div class="form">


<input
id="item-name"
type="text"
placeholder="商品名"
/>



<input
id="item-count"
type="number"
placeholder="数量"
/>



<select id="item-category">


<option value="食品">
食品
</option>


<option value="飲料">
飲料
</option>


<option value="日用品">
日用品
</option>


<option value="その他">
その他
</option>


</select>




<input
id="item-limit"
type="date"
/>



<button id="add-button">

登録

</button>


</div>


</section>





<section class="list-card">


<h2>
在庫一覧
</h2>


<div
id="inventory-list">

</div>


</section>






<section class="shopping-card">


<h2>
🛒 買い物リスト
</h2>


<div
id="shopping-list">

</div>


</section>





<section class="warning-card">


<h2>
⚠ 期限チェック
</h2>


<div
id="expire-list">

</div>


</section>




</main>




<footer>

GitHub Pages Edition

</footer>



<script src="js/storage.js"></script>

<script src="js/app.js"></script>


</body>

</html>
